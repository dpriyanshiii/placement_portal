<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Drive</title>
</head>
<body>

  <h1>Create Placement Drive</h1>
  <a href="{{ url_for('company.dashboard') }}">Back to Dashboard</a>

  <form method="POST" action="{{ url_for('company.create_drive') }}">
    <p>
      Drive Name:<br>
      <input type="text" name="drive_name" required>
    </p>
    <p>
      Job Title:<br>
      <input type="text" name="job_title" required>
    </p>
    <p>
      Job Description:<br>
      <textarea name="job_description" required></textarea>
    </p>
    <p>
      Eligibility Criteria:<br>
      <textarea name="eligibility_criteria" required></textarea>
    </p>
    <p>
      Salary:<br>
      <input type="number" step="0.01" name="salary" required>
    </p>
    <p>
      Location:<br>
      <input type="text" name="location" required>
    </p>
    <p>
      Application Deadline:<br>
      <input type="datetime-local" name="deadline" required>
    </p>
    <p>
      <button type="submit">Create Drive</button>
    </p>
  </form>

</body>
</html>
