<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <p><strong>{{ message }}</strong></p>
        {% endfor %}
    {% endwith %}

    <form action="{{ url_for('auth.login') }}" method="POST">
        <input type="email"
               name="email"
               placeholder="Enter email"
               required>
        <br><br>

        <input type="password"
               name="password"
               placeholder="Enter password"
               minlength="5"
               maxlength="20"
               required>
        <br><br>

        <button type="submit">Login</button>
    </form>

    <br>
    <a href="{{ url_for('auth.student_signup') }}">Sign up as a student</a>
    <br>
    <a href="{{ url_for('auth.company_signup') }}">Sign up as a company</a>

    <br><br>
    <a href="{{ url_for('home') }}">Go back to Home</a>
</body>
</html>
