<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Sign Up</title>
</head>
<body>
    <h1>Company Sign Up</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <p><strong>{{ message }}</strong></p>
        {% endfor %}
    {% endwith %}

    <form action="{{ url_for('auth.company_signup') }}" method="POST" enctype="multipart/form-data">

        <input type="text"
               name="company_name"
               placeholder="Company name"
               maxlength="100"
               required>
        <br><br>

        <input type="text"
               name="hr_fname"
               placeholder="HR first name"
               maxlength="20"
               required>
        <br><br>

        <input type="text"
               name="hr_lname"
               placeholder="HR last name"
               maxlength="20"
               required>
        <br><br>

        <input type="email"
               name="hr_email"
               placeholder="HR email"
               maxlength="100"
               required>
        <br><br>

        <input type="url"
               name="website"
               placeholder="Website (https://...)"
               maxlength="200">
        <br><br>

        <textarea name="description"
                  placeholder="Company description"
                  rows="4"
                  cols="40"></textarea>
        <br><br>

        <label for="logo">Company logo (image):</label>
        <input type="file"
               id="logo"
               name="logo"
               accept="image/*">
        <br><br>

        <input type="text"
               name="username"
               placeholder="Username (5–20 chars)"
               minlength="5"
               maxlength="20"
               required>
        <br><br>

        <input type="email"
               name="email"
               placeholder="Account email"
               maxlength="100"
               required>
        <br><br>

        <input type="password"
               name="password"
               placeholder="Password (5–20 chars)"
               minlength="5"
               maxlength="20"
               required>
        <br><br>

        <button type="submit">Register Company</button>
    </form>

    <br>
    <a href="{{ url_for('auth.login') }}">Already have an account? Login</a>

    <br><br>
    <a href="{{ url_for('home') }}">Go back to Home</a>
</body>
</html>
