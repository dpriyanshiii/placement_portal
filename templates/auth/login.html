{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block extra_head %}
<style>
  /* full-viewport fixed background — lives OUTSIDE login-wrap so overflow:hidden doesn't clip it */
  .login-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .login-bg img {
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.38;
    mix-blend-mode: luminosity;
    animation: kenBurns 18s ease-in-out infinite alternate;
  }
  /* dark overlay so text is always readable */
  .login-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(13,13,13,0.72);
  }

  .login-wrap {
    min-height: calc(100vh - 56px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    /* no overflow:hidden — let the fixed bg show through */
  }

  /* ghosted background text */
  .login-wrap::before {
    z-index: 1;
    content: 'IITM';
    position: absolute;
    left: -2rem;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-display);
    font-size: 22vw;
    font-weight: 900;
    color: rgba(255,255,255,0.025);
    letter-spacing: -0.05em;
    pointer-events: none;
    line-height: 1;
    animation: ghostDrift 12s ease-in-out infinite alternate;
  }
  .login-wrap::after {
    z-index: 1;
    content: '2026';
    position: absolute;
    right: -1rem;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-display);
    font-size: 18vw;
    font-weight: 900;
    color: rgba(232,160,32,0.05);
    letter-spacing: -0.05em;
    pointer-events: none;
    line-height: 1;
    animation: ghostDrift 12s ease-in-out infinite alternate-reverse;
  }
  @keyframes ghostDrift {
    from { transform: translateY(-52%); }
    to   { transform: translateY(-48%); }
  }

  /* decorative dots */
  .login-dots {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 2;
  }
  .login-dot {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--amber);
    opacity: 0.18;
    animation: dotPulse 3s ease-in-out infinite;
  }
  .login-dot:nth-child(1) { top: 15%; left: 8%;  animation-delay: 0s; }
  .login-dot:nth-child(2) { top: 70%; left: 6%;  animation-delay: 0.8s; }
  .login-dot:nth-child(3) { top: 40%; left: 12%; animation-delay: 1.6s; }
  .login-dot:nth-child(4) { top: 20%; right: 8%; animation-delay: 0.4s; }
  .login-dot:nth-child(5) { top: 65%; right: 6%; animation-delay: 1.2s; }
  .login-dot:nth-child(6) { top: 85%; right: 12%; animation-delay: 2s; }

  /* decorative side lines */
  .login-line-left,
  .login-line-right {
    position: absolute;
    top: 20%;
    width: 1px;
    height: 60%;
    background: linear-gradient(to bottom, transparent, var(--line), transparent);
    pointer-events: none;
    z-index: 2;
  }
  .login-line-left  { left: 18%; }
  .login-line-right { right: 18%; }

  /* back link */
  .login-back {
    position: absolute;
    top: 1.5rem;
    left: 2rem;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: color 0.15s;
    z-index: 10;
  }
  .login-back:hover { color: var(--amber); }

  /* branding animation */
  .login-brand {
    text-align: center;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 3;
  }
  .login-brand .hero__overline {
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.1s;
  }
  .login-brand h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: var(--paper);
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.25s;
  }
  .login-brand p {
    color: rgba(245,240,232,0.65);
    font-size: 0.9rem;
    margin-top: 0.75rem;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.4s;
  }

  /* card — solid dark bg so it always pops */
  .login-card {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 3;
    opacity: 0;
    animation: fadeUp 0.55s ease forwards 0.55s;
    background: #151210 !important;
    border-color: #2a2520 !important;
  }

  /* signup links animation */
  .login-signup {
    margin-top: 1.5rem;
    text-align: center;
    position: relative;
    z-index: 3;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.7s;
  }

  /* button shimmer */
  .btn-shimmer {
    position: relative;
    overflow: hidden;
  }
  .btn-shimmer::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: skewX(-20deg);
    transition: none;
  }
  .btn-shimmer:hover::after {
    animation: shimmer 0.55s ease forwards;
  }
  @keyframes shimmer {
    from { left: -100%; }
    to   { left: 160%; }
  }

  /* input glow on focus */
  .field input:focus {
    box-shadow: 0 0 0 2px rgba(232,160,32,0.15), 0 0 20px rgba(232,160,32,0.08) !important;
  }
</style>
{% endblock %}

{% block body %}

<!-- background lives outside login-wrap so overflow:hidden doesn't clip it -->
<div class="login-bg">
  <img src="{{ url_for('static', filename='indexbg.jpg') }}" alt="">
</div>

<div class="login-wrap">

  <!-- decorative dots -->
  <div class="login-dots">
    <div class="login-dot"></div>
    <div class="login-dot"></div>
    <div class="login-dot"></div>
    <div class="login-dot"></div>
    <div class="login-dot"></div>
    <div class="login-dot"></div>
  </div>

  <!-- decorative lines -->
  <div class="login-line-left"></div>
  <div class="login-line-right"></div>

  <!-- back link -->
  <a href="{{ url_for('home') }}" class="login-back">← Home</a>

  <!-- branding -->
  <div class="login-brand">
    <p class="hero__overline">IIT Madras</p>
    <h1>Welcome <em style="color: var(--amber); font-style: italic;">back.</em></h1>
    <p>Your next opportunity is waiting.</p>
  </div>

  <!-- form card -->
  <div class="login-card card">
    <div class="card-body">
      <form action="{{ url_for('auth.login') }}" method="POST">
        <div style="display: flex; flex-direction: column; gap: 1.25rem;">

          <div class="field">
            <label>Email address</label>
            <input type="email" name="email" placeholder="you@example.com" required>
          </div>

          <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" minlength="5" maxlength="20" required>
          </div>

          <button type="submit" class="btn btn-primary btn-shimmer" style="width: 100%; justify-content: center; padding: 0.75rem; margin-top: 0.25rem;">
            Login →
          </button>

        </div>
      </form>
    </div>
  </div>

  <!-- signup links -->
  <div class="login-signup">
    <p style="font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.75rem;">New here?</p>
    <div style="display: flex; gap: 0.5rem; justify-content: center;">
      <a href="{{ url_for('auth.student_signup') }}" class="btn btn-outline">Student Signup</a>
      <a href="{{ url_for('auth.company_signup') }}" class="btn btn-outline">Company Signup</a>
    </div>
  </div>

</div>
{% endblock %}
